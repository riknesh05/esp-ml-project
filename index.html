<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ESP8266 ML Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background: #0f0f0f; color: white; }
    .card { background: #1e1e1e; border-radius: 16px; padding: 30px; max-width: 400px; margin: 20px auto; }
    .status { font-size: 48px; margin: 10px 0; }
    .label { font-size: 24px; font-weight: bold; color: #00e676; }
    .message { font-size: 14px; color: #aaa; margin-top: 8px; }
    .timestamp { font-size: 12px; color: #555; margin-top: 16px; }
    .loader { font-size: 13px; color: #888; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>ESP8266 ML Monitor</h1>
  <div class="card">
    <div class="status" id="icon">⏳</div>
    <div class="label" id="label">Waiting for ESP...</div>
    <div class="message" id="message">No signal yet</div>
    <div class="loader" id="loader"></div>
    <div class="timestamp" id="time"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBYHkRbQtRRPkejzoeteaDdEzq3NCvWwr0",
      authDomain: "esp-ml-project.firebaseapp.com",
      databaseURL: "https://esp-ml-project-default-rtdb.firebaseio.com",
      projectId: "esp-ml-project",
      storageBucket: "esp-ml-project.firebasestorage.app",
      messagingSenderId: "438585872509",
      appId: "1:438585872509:web:150ca7832d3728bbf46114"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const ML_API = "https://ml-api-ywxh.onrender.com/predict";

    // Listen to ESP data from Firebase
    onValue(ref(db, "/sensorData"), async (snap) => {
      const data = snap.val();
      if (!data) return;

      // Show loading while calling ML API
      document.getElementById("loader").innerText = "🔄 Calling ML API...";
      document.getElementById("icon").innerText = "⏳";

      try {
        // Call Render.com ML API directly
        const response = await fetch(ML_API, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ status: data.status })
        });

        const result = await response.json();

        // Update UI with ML result
        document.getElementById("icon").innerText = result.label === "OK" ? "✅" : "❌";
        document.getElementById("label").innerText = result.label;
        document.getElementById("message").innerText = result.message;
        document.getElementById("loader").innerText = "";
        document.getElementById("time").innerText =
          "Last updated: " + new Date().toLocaleTimeString();

      } catch (err) {
        document.getElementById("icon").innerText = "⚠️";
        document.getElementById("label").innerText = "ML API Error";
        document.getElementById("message").innerText = "Render.com may be sleeping, retrying...";
        document.getElementById("loader").innerText = "";
        console.error("ML API Error:", err);
      }
    });
  </script>
</body>
</html>
